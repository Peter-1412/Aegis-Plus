apiVersion: v1
kind: ServiceAccount
metadata:
  name: ops-service-sa
  namespace: aegis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ops-service-read-all
rules:
  # 核心资源只读权限 (Nodes, Pods, Services, Namespaces, ConfigMaps, Secrets, Events, etc.)
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # 应用资源只读权限 (Deployments, StatefulSets, DaemonSets, ReplicaSets)
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # 批处理任务只读权限 (Jobs, CronJobs)
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # 网络资源只读权限 (Ingresses, NetworkPolicies)
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # 存储资源只读权限 (PersistentVolumes, PersistentVolumeClaims, StorageClasses)
  - apiGroups: ["storage.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # 监控与指标只读权限 (Metrics API)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # 扩展资源只读权限 (CRDs)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # RBAC 只读权限 (查看谁有什么权限)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ops-service-configmap-updater
  namespace: aegis
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["aegis-metadata"]
    verbs: ["get", "list", "watch", "update", "patch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ops-service-configmap-updater-binding
  namespace: aegis
subjects:
  - kind: ServiceAccount
    name: ops-service-sa
    namespace: aegis
roleRef:
  kind: Role
  name: ops-service-configmap-updater
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ops-service-read-all-binding
subjects:
  - kind: ServiceAccount
    name: ops-service-sa
    namespace: aegis
roleRef:
  kind: ClusterRole
  name: ops-service-read-all
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-service
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ops-service
  template:
    metadata:
      labels:
        app: ops-service
    spec:
      serviceAccountName: ops-service-sa
      containers:
        - name: ops-service
          image: aegis-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: metadata-volume
              mountPath: /app/app/data
            - name: db-data
              mountPath: /app/aegis.db
          env:
            - name: LOKI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: LOKI_BASE_URL
            - name: JAEGER_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: JAEGER_BASE_URL
            - name: LOKI_TENANT_ID
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: LOKI_TENANT_ID
            - name: LOKI_SERVICE_LABEL_KEY
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: LOKI_SERVICE_LABEL_KEY
            - name: LOKI_SELECTOR_TEMPLATE
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: LOKI_SELECTOR_TEMPLATE
            - name: PROMETHEUS_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: PROMETHEUS_BASE_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_QWEN_MODEL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_GLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_DEEPSEEK_MODEL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_DISABLE_THINKING

              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: OLLAMA_DISABLE_THINKING
            - name: OLLAMA_NUM_PREDICT
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: OLLAMA_NUM_PREDICT
            - name: OLLAMA_TEMPERATURE
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: OLLAMA_TEMPERATURE
            - name: OLLAMA_TOP_P
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: OLLAMA_TOP_P
            - name: AGENT_MAX_ITERATIONS
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: AGENT_MAX_ITERATIONS
            - name: AGENT_MAX_EXECUTION_TIME_S
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: AGENT_MAX_EXECUTION_TIME_S
            - name: FEISHU_APP_ID
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: FEISHU_APP_ID
            - name: FEISHU_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: FEISHU_APP_SECRET
            - name: FEISHU_VERIFICATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: FEISHU_VERIFICATION_TOKEN
            - name: FEISHU_DEFAULT_CHAT_ID
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: FEISHU_DEFAULT_CHAT_ID
            - name: ARK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: ARK_API_KEY
            - name: DEFAULT_MODEL
              value: "doubao"
            - name: OPSPILOT_BACKEND_URL
              value: "http://opspilot-plus.default.svc.cluster.local:3000"
      volumes:
        - name: metadata-volume
          configMap:
            name: aegis-metadata
            items:
              - key: my_cluster_metadata.json
                path: my_cluster_metadata.json
        - name: db-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ops-service
  namespace: aegis
spec:
  type: NodePort
  selector:
    app: ops-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30092
